<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menus Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f; --surface:#12121a; --surface2:#1a1a26;
    --orange:#ff8c00; --orange2:#ff5500; --text:#f0f0f8;
    --muted:#5a5a78; --border:#2a2a3a; --green:#4caf82;
    --blue:#47aaff; --red:#ff4757; --purple:#a855f7;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; padding:16px 16px 100px; }

  .tab-bar { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
  .tab { flex:1; padding:12px 8px 10px; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; border:none; background:none; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:10px; letter-spacing:1px; text-transform:uppercase; -webkit-tap-highlight-color:transparent; }
  .tab.active { color:var(--orange); }
  .tab-icon { font-size:20px; }
  .page { display:none; }
  .page.active { display:block; }

  .page-title { font-family:'Bebas Neue',sans-serif; font-size:44px; letter-spacing:4px; background:linear-gradient(135deg,var(--orange),var(--orange2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; line-height:1; text-align:center; margin-bottom:4px; }
  .page-sub { color:var(--muted); font-size:11px; letter-spacing:3px; text-transform:uppercase; text-align:center; margin-bottom:18px; }

  .card { background:var(--surface); border:1px solid var(--border); border-radius:13px; padding:16px; margin-bottom:12px; }
  .card-title { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:2px; margin-bottom:12px; }

  select, input[type=number], input[type=text] {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:9px; color:var(--text); font-family:'DM Sans',sans-serif;
    font-size:13px; padding:9px 11px; appearance:none; width:100%;
  }
  .lbl { font-size:9px; color:var(--muted); margin-bottom:3px; display:block; text-transform:uppercase; letter-spacing:1px; }
  .field { margin-bottom:10px; }
  .grid4 { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; }

  .btn-primary { width:100%; padding:12px; background:linear-gradient(135deg,var(--orange),var(--orange2)); border:none; border-radius:10px; color:#000; font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:2px; cursor:pointer; }
  .btn-ghost { width:100%; padding:9px; background:transparent; border:1px solid var(--border); border-radius:9px; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:11px; letter-spacing:2px; text-transform:uppercase; cursor:pointer; margin-top:8px; }
  .btn-sm { padding:5px 11px; border-radius:7px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:11px; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .btn-add-line { width:100%; padding:8px; background:rgba(255,140,0,0.06); border:1px dashed rgba(255,140,0,0.35); border-radius:8px; color:var(--orange); font-size:12px; cursor:pointer; font-family:'DM Sans',sans-serif; margin-top:6px; }

  /* DAY CARDS */
  .day-card { background:var(--surface); border:1px solid var(--border); border-radius:13px; margin-bottom:10px; overflow:hidden; }
  .day-header { padding:13px 14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; -webkit-tap-highlight-color:transparent; }
  .day-name { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; }
  .day-seance-lbl { font-size:11px; color:var(--muted); margin-top:2px; }
  .day-kcal { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--orange); text-align:right; }
  .day-macros-sm { font-size:10px; color:var(--muted); text-align:right; margin-top:2px; }
  .day-body { display:none; padding:0 14px 14px; border-top:1px solid var(--border); }
  .day-body.open { display:block; }

  .macro-pills { display:flex; gap:6px; flex-wrap:wrap; margin:10px 0 12px; }
  .mpill { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; }
  .mpill.k { background:rgba(255,140,0,0.1); color:var(--orange); border:1px solid rgba(255,140,0,0.3); }
  .mpill.p { background:rgba(76,175,130,0.1); color:var(--green); border:1px solid rgba(76,175,130,0.3); }
  .mpill.g { background:rgba(71,170,255,0.1); color:var(--blue); border:1px solid rgba(71,170,255,0.3); }
  .mpill.l { background:rgba(168,85,247,0.1); color:var(--purple); border:1px solid rgba(168,85,247,0.3); }

  /* REPAS BLOCK */
  .repas-block { margin-bottom:10px; }
  .repas-title { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
  .repas-line { background:var(--surface2); border-radius:9px; padding:9px 10px; margin-bottom:5px; }
  .repas-line-top { display:grid; grid-template-columns:1fr 70px 28px; gap:6px; align-items:center; }
  .repas-line-info { font-size:10px; color:var(--muted); margin-top:5px; padding-left:2px; }
  .mult-input { text-align:center; font-size:13px; font-weight:600; color:var(--orange) !important; padding:9px 6px !important; }
  .btn-del-line { background:none; border:none; color:var(--red); font-size:16px; cursor:pointer; padding:2px; }

  /* TOTAL BAR */
  .total-bar { background:var(--surface2); border-radius:9px; padding:10px 12px; margin-top:10px; display:flex; justify-content:space-between; align-items:center; }
  .total-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .total-vals { display:flex; gap:10px; }
  .total-val { font-size:12px; font-weight:600; }

  /* PLATS */
  .plat-item { background:var(--surface2); border-radius:10px; padding:12px; margin-bottom:8px; }
  .plat-nom { font-size:13px; font-weight:600; margin-bottom:3px; }
  .plat-macros { font-size:11px; color:var(--muted); margin-bottom:5px; }
  .plat-ingr { font-size:10px; color:var(--muted); margin-bottom:6px; line-height:1.7; }
  .section-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin:12px 0 6px; }

  /* INGR ROWS */
  .ingr-row { display:grid; grid-template-columns:1fr 70px 56px 28px; gap:5px; align-items:center; margin-bottom:5px; }
  .ingr-row input, .ingr-row select { font-size:12px !important; padding:7px 8px !important; }

  /* COURSES */
  .cours-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); }
  .empty-state { text-align:center; padding:32px 16px; color:var(--muted); font-size:12px; line-height:2; }
  .empty-icon { font-size:32px; margin-bottom:8px; }
</style>
</head>
<body>

<!-- PAGE SEMAINE -->
<div class="page active" id="page-semaine">
  <div class="page-title">SEMAINE</div>
  <div class="page-sub" id="weekLabel">—</div>
  <div style="display:flex;gap:8px;margin-bottom:14px;">
    <button onclick="changeWeek(-1)" style="flex:1;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--muted);font-size:20px;cursor:pointer;">‹</button>
    <button onclick="changeWeek(1)"  style="flex:1;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--muted);font-size:20px;cursor:pointer;">›</button>
  </div>
  <div id="weekContainer"></div>
</div>

<!-- PAGE COURSES -->
<div class="page" id="page-courses">
  <div class="page-title">COURSES</div>
  <div class="page-sub">Semaine en cours</div>
  <div class="card">
    <div class="card-title">🛒 LISTE</div>
    <div id="coursesList"><div class="empty-state"><div class="empty-icon">🛒</div>Planifie ta semaine d'abord.</div></div>
    <button class="btn-ghost" onclick="clearWeek()">↺ Effacer la semaine</button>
  </div>
</div>

<!-- PAGE PLATS -->
<div class="page" id="page-plats">
  <div class="page-title">PLATS</div>
  <div class="page-sub">Ma bibliothèque</div>

  <div class="card">
    <div class="card-title" id="platFormTitle">+ NOUVEAU PLAT</div>
    <input type="hidden" id="platEditIdx" value="">
    <div class="field"><span class="lbl">Nom</span><input type="text" id="platNom" placeholder="Ex : Poulet riz courgettes"></div>
    <div class="field">
      <span class="lbl">Repas</span>
      <select id="platRepas">
        <option value="ptdej">🌅 Petit déjeuner</option>
        <option value="dejeuner">🕛 Déjeuner</option>
        <option value="diner">🌙 Dîner</option>
        <option value="collation">🍎 Collation</option>
        <option value="any">🍽️ Tous repas</option>
      </select>
    </div>
    <div class="field">
      <span class="lbl">Macros pour 1 portion (coeff ×1.0)</span>
      <div class="grid4">
        <div><span class="lbl">KCAL</span><input type="number" id="platKcal" placeholder="0"></div>
        <div><span class="lbl">PROT g</span><input type="number" id="platP" placeholder="0"></div>
        <div><span class="lbl">GLUC g</span><input type="number" id="platG" placeholder="0"></div>
        <div><span class="lbl">LIP g</span><input type="number" id="platL" placeholder="0"></div>
      </div>
    </div>
    <div class="field">
      <span class="lbl">Ingrédients (quantités pour coeff ×1.0)</span>
      <div id="ingrList"></div>
      <button class="btn-add-line" onclick="addIngrRow()">+ Ingrédient</button>
    </div>
    <button class="btn-primary" onclick="savePlat()">ENREGISTRER</button>
    <button class="btn-ghost" id="platCancelBtn" style="display:none;" onclick="cancelPlatEdit()">Annuler</button>
  </div>

  <div class="card">
    <div class="card-title">📋 MES PLATS</div>
    <div id="platsList"><div class="empty-state"><div class="empty-icon">🍽️</div>Aucun plat encore.</div></div>
  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab active" id="tab-semaine" onclick="showPage('semaine')"><span class="tab-icon">📅</span>Semaine</button>
  <button class="tab" id="tab-courses" onclick="showPage('courses'); renderCourses()"><span class="tab-icon">🛒</span>Courses</button>
  <button class="tab" id="tab-plats" onclick="showPage('plats')"><span class="tab-icon">🍽️</span>Plats</button>
</div>

<script>
// ── STORAGE ───────────────────────────────────────────
let db;
function openDB() {
  return new Promise((res,rej) => {
    const req = indexedDB.open('menuscoach5',1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('kv',{keyPath:'k'});
    req.onsuccess = e => { db=e.target.result; res(); };
    req.onerror = rej;
  });
}
const dbGet = k => new Promise(res => { try { const r=db.transaction('kv','readonly').objectStore('kv').get(k); r.onsuccess=()=>res(r.result?r.result.v:null); r.onerror=()=>res(null); } catch(e){res(null);} });
const dbSet = (k,v) => new Promise(res => { try { const tx=db.transaction('kv','readwrite'); tx.objectStore('kv').put({k,v}); tx.oncomplete=res; tx.onerror=res; } catch(e){res();} });
const dbDel = k => new Promise(res => { try { const tx=db.transaction('kv','readwrite'); tx.objectStore('kv').delete(k); tx.oncomplete=res; tx.onerror=res; } catch(e){res();} });

// ── NAV ───────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}

// ── CONSTANTS ─────────────────────────────────────────
const MACROS = {
  repos:       {kcal:1700,p:170,g:131,l:55,  label:'😴 Repos'},
  veillesortie:{kcal:1970,p:160,g:209,l:55,  label:'😴 Veille sortie longue'},
  renfo:       {kcal:1800,p:170,g:145,l:60,  label:'💪 Renfo'},
  ef:          {kcal:2000,p:170,g:195,l:60,  label:'🏃 EF'},
  efrenfo:     {kcal:2050,p:175,g:198,l:62,  label:'🏃💪 EF + Renfo'},
  seuil:       {kcal:2150,p:175,g:221,l:63,  label:'🏃 Seuil'},
  allure:      {kcal:2200,p:175,g:233,l:63,  label:'🏃 Allure'},
  sortie:      {kcal:2300,p:165,g:270,l:62,  label:'🏃 Sortie longue'},
};
const REPAS_SLOTS  = ['ptdej','dejeuner','diner','collation'];
const REPAS_LABELS = {ptdej:'🌅 Petit déjeuner', dejeuner:'🕛 Déjeuner', diner:'🌙 Dîner', collation:'🍎 Collation'};
const DAYS_FR = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

let plats = [];
let weekOffset = 0;

// ── DATES ─────────────────────────────────────────────
function getMonday(d=new Date()) {
  const day = d.getDay();
  const diff = day===0 ? -6 : 1-day;
  const m = new Date(d);
  m.setDate(d.getDate()+diff);
  m.setHours(0,0,0,0);
  return m;
}
function getWeekDays(offset=0) {
  const mon = getMonday();
  mon.setDate(mon.getDate()+offset*7);
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function isoDate(d) { return d.toISOString().split('T')[0]; }
function weekKey(days) {
  const d=days[0], jan1=new Date(d.getFullYear(),0,1);
  const wk=Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
  return `${d.getFullYear()}-W${String(wk).padStart(2,'0')}`;
}
function changeWeek(dir) { weekOffset+=dir; renderWeek(); }

// ── WEEK RENDER ───────────────────────────────────────
async function renderWeek() {
  const days = getWeekDays(weekOffset);
  const wk   = weekKey(days);
  const saved = JSON.parse(await dbGet('week_'+wk) || '{}');

  const fmt = d => d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  document.getElementById('weekLabel').textContent = `${fmt(days[0])} — ${fmt(days[6])}`;

  const container = document.getElementById('weekContainer');
  // Remember open days
  const openDays = [...document.querySelectorAll('.day-body.open')].map(el => el.id.replace('daybody-',''));
  container.innerHTML = '';

  days.forEach((day,di) => {
    const iso = isoDate(day);
    const dd  = saved[iso] || {seance:'repos', repas:{}};
    const mac = MACROS[dd.seance] || MACROS.repos;

    // Compute day totals from selected dishes
    let totK=0, totP=0, totG=0, totL=0;
    REPAS_SLOTS.forEach(slot => {
      (dd.repas[slot]||[]).forEach(entry => {
        const p = plats[entry.idx];
        if (!p) return;
        const m = parseFloat(entry.mult)||1;
        totK += Math.round(p.kcal*m);
        totP += Math.round(p.p*m);
        totG += Math.round(p.g*m);
        totL += Math.round(p.l*m);
      });
    });

    const diffK = totK - mac.kcal;
    const diffCol = Math.abs(diffK)<150 ? 'var(--green)' : diffK>0 ? 'var(--blue)' : 'var(--red)';

    const card = document.createElement('div');
    card.className = 'day-card';

    // Build repas HTML
    const repasHtml = REPAS_SLOTS.map(slot => {
      const entries = dd.repas[slot] || [];
      const available = plats.filter(p => p.repas===slot||p.repas==='any');
      const linesHtml = entries.map((entry,li) => {
        const p = plats[entry.idx];
        const m = parseFloat(entry.mult)||1;
        const platMacros = p ? `${Math.round(p.kcal*m)} kcal · P${Math.round(p.p*m)}g · G${Math.round(p.g*m)}g · L${Math.round(p.l*m)}g` : '';
        const ingrDetail = p && p.ingredients && p.ingredients.length
          ? p.ingredients.map(i=>`${i.nom} ${Math.round((parseFloat(i.qty)||0)*m*10)/10}${i.unit}`).join(' · ')
          : '';
        return `<div class="repas-line">
          <div class="repas-line-top">
            <select onchange="updateRepasLine('${iso}','${slot}',${li},'idx',this.value)">
              <option value="">— Aucun —</option>
              ${available.map(p=>{const ri=plats.indexOf(p); return `<option value="${ri}" ${String(entry.idx)===String(ri)?'selected':''}>${p.nom}</option>`;}).join('')}
            </select>
            <input type="number" inputmode="decimal" class="mult-input" value="${entry.mult||1}" step="0.1" min="0.1" max="5"
              onblur="updateRepasLine('${iso}','${slot}',${li},'mult',this.value)"
              title="Coefficient (1.0 = portion normale)">
            <button class="btn-del-line" onclick="removeRepasLine('${iso}','${slot}',${li})">✕</button>
          </div>
          ${p ? `<div class="repas-line-info">×${m} → ${platMacros}${ingrDetail?'<br>'+ingrDetail:''}</div>` : ''}
        </div>`;
      }).join('');

      return `<div class="repas-block">
        <div class="repas-title">${REPAS_LABELS[slot]}</div>
        ${linesHtml}
        <button class="btn-add-line" onclick="addRepasLine('${iso}','${slot}')">+ Ajouter un plat</button>
      </div>`;
    }).join('');

    card.innerHTML = `
      <div class="day-header" onclick="toggleDay('${iso}')">
        <div>
          <div class="day-name">${DAYS_FR[di]} <span style="font-size:13px;color:var(--muted);">${day.getDate()}/${day.getMonth()+1}</span></div>
          <div class="day-seance-lbl">${mac.label}</div>
        </div>
        <div>
          <div class="day-kcal" style="color:${totK>0?diffCol:'var(--muted)'};">${totK>0?totK+'  kcal':mac.kcal+' kcal'}</div>
          <div class="day-macros-sm">${totK>0?`P${totP}g · G${totG}g · L${totL}g`:`cible P${mac.p}g`}</div>
        </div>
      </div>
      <div class="day-body${openDays.includes(iso)?' open':''}" id="daybody-${iso}">
        <div style="margin-top:10px;">
          <span class="lbl">Séance</span>
          <select onchange="updateSeance('${iso}',this.value)" style="margin-bottom:12px;">
            ${Object.entries(MACROS).map(([k,v])=>`<option value="${k}" ${dd.seance===k?'selected':''}>${v.label}</option>`).join('')}
          </select>
        </div>
        <div class="macro-pills">
          <span class="mpill k">🎯 ${mac.kcal} kcal</span>
          <span class="mpill p">P ${mac.p}g</span>
          <span class="mpill g">G ${mac.g}g</span>
          <span class="mpill l">L ${mac.l}g</span>
        </div>
        ${repasHtml}
        ${totK>0?`<div class="total-bar">
          <span class="total-label">Total jour</span>
          <div class="total-vals">
            <span class="total-val" style="color:${diffCol};">${totK} kcal</span>
            <span class="total-val" style="color:var(--green);">P${totP}g</span>
            <span class="total-val" style="color:var(--blue);">G${totG}g</span>
            <span class="total-val">L${totL}g</span>
          </div>
        </div>`:''}
      </div>`;
    container.appendChild(card);
  });
}

function toggleDay(iso) {
  document.getElementById('daybody-'+iso).classList.toggle('open');
}

async function getWeekSaved() {
  const days = getWeekDays(weekOffset);
  const wk = weekKey(days);
  const saved = JSON.parse(await dbGet('week_'+wk)||'{}');
  return {saved, wk};
}

async function updateSeance(iso, seance) {
  const {saved,wk} = await getWeekSaved();
  if (!saved[iso]) saved[iso]={seance:'repos',repas:{}};
  saved[iso].seance = seance;
  await dbSet('week_'+wk, JSON.stringify(saved));
  renderWeek();
}

async function addRepasLine(iso, slot) {
  const {saved,wk} = await getWeekSaved();
  if (!saved[iso]) saved[iso]={seance:'repos',repas:{}};
  if (!saved[iso].repas[slot]) saved[iso].repas[slot]=[];
  saved[iso].repas[slot].push({idx:'', mult:1});
  await dbSet('week_'+wk, JSON.stringify(saved));
  renderWeek();
}

async function removeRepasLine(iso, slot, li) {
  const {saved,wk} = await getWeekSaved();
  saved[iso].repas[slot].splice(li,1);
  await dbSet('week_'+wk, JSON.stringify(saved));
  renderWeek();
}

async function updateRepasLine(iso, slot, li, field, value) {
  const {saved,wk} = await getWeekSaved();
  if (!saved[iso]||!saved[iso].repas[slot]||!saved[iso].repas[slot][li]) return;
  if (field==='idx') saved[iso].repas[slot][li].idx = value===''?'':parseInt(value);
  if (field==='mult') saved[iso].repas[slot][li].mult = parseFloat(value)||1;
  await dbSet('week_'+wk, JSON.stringify(saved));
  renderWeek();
}

// ── COURSES ───────────────────────────────────────────
async function renderCourses() {
  const days = getWeekDays(weekOffset);
  const wk = weekKey(days);
  const saved = JSON.parse(await dbGet('week_'+wk)||'{}');
  const totaux = {};

  days.forEach(day => {
    const dd = saved[isoDate(day)];
    if (!dd) return;
    REPAS_SLOTS.forEach(slot => {
      (dd.repas[slot]||[]).forEach(entry => {
        const p = plats[entry.idx];
        if (!p||!p.ingredients) return;
        const m = parseFloat(entry.mult)||1;
        p.ingredients.forEach(ingr => {
          if (!ingr.nom) return;
          if (!totaux[ingr.nom]) totaux[ingr.nom]={qty:0,unit:ingr.unit};
          totaux[ingr.nom].qty += Math.round((parseFloat(ingr.qty)||0)*m*10)/10;
        });
      });
    });
  });

  const el = document.getElementById('coursesList');
  if (!Object.keys(totaux).length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div>Aucun ingrédient planifié.</div>';
    return;
  }
  el.innerHTML = Object.entries(totaux)
    .sort((a,b)=>a[0].localeCompare(b[0]))
    .map(([nom,d])=>`<div class="cours-row"><span style="font-size:13px;">${nom}</span><span style="font-size:12px;font-weight:600;color:var(--orange);">${d.qty} ${d.unit}</span></div>`)
    .join('');
}

async function clearWeek() {
  if (!confirm('Effacer toute la semaine ?')) return;
  const days = getWeekDays(weekOffset);
  await dbDel('week_'+weekKey(days));
  renderWeek();
  renderCourses();
}

// ── PLATS ─────────────────────────────────────────────
let ingrCounter = 0;

function addIngrRow(nom='', qty='', unit='g') {
  ingrCounter++;
  const id='ir-'+ingrCounter;
  const div=document.createElement('div');
  div.className='ingr-row';
  div.id=id;
  div.innerHTML=`
    <input type="text" placeholder="Ingrédient" value="${nom}">
    <input type="number" placeholder="Qté" value="${qty}" step="0.1">
    <select>
      <option value="g" ${unit==='g'?'selected':''}>g</option>
      <option value="ml" ${unit==='ml'?'selected':''}>ml</option>
      <option value="unité" ${unit==='unité'?'selected':''}>unité</option>
    </select>
    <button class="btn-del-line" onclick="document.getElementById('${id}').remove()">✕</button>`;
  document.getElementById('ingrList').appendChild(div);
}

function getIngredients() {
  return [...document.querySelectorAll('#ingrList .ingr-row')].map(row=>{
    const [nomI,qtyI]=row.querySelectorAll('input');
    const unit=row.querySelector('select').value;
    return {nom:nomI.value.trim(), qty:qtyI.value, unit};
  }).filter(i=>i.nom);
}

async function savePlat() {
  const nom=document.getElementById('platNom').value.trim();
  if (!nom){alert('Entre un nom !');return;}
  const plat={
    nom,
    repas: document.getElementById('platRepas').value,
    kcal:  parseFloat(document.getElementById('platKcal').value)||0,
    p:     parseFloat(document.getElementById('platP').value)||0,
    g:     parseFloat(document.getElementById('platG').value)||0,
    l:     parseFloat(document.getElementById('platL').value)||0,
    ingredients: getIngredients(),
  };
  const idx=document.getElementById('platEditIdx').value;
  if (idx!=='') plats[parseInt(idx)]=plat; else plats.push(plat);
  await dbSet('plats',JSON.stringify(plats));
  resetPlatForm();
  renderPlats();
  renderWeek();
}

function resetPlatForm() {
  ['platNom','platKcal','platP','platG','platL'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('platEditIdx').value='';
  document.getElementById('platFormTitle').textContent='+ NOUVEAU PLAT';
  document.getElementById('platCancelBtn').style.display='none';
  document.getElementById('ingrList').innerHTML='';
  ingrCounter=0;
}

function editPlat(idx) {
  const p=plats[idx];
  document.getElementById('platNom').value=p.nom;
  document.getElementById('platRepas').value=p.repas;
  document.getElementById('platKcal').value=p.kcal;
  document.getElementById('platP').value=p.p;
  document.getElementById('platG').value=p.g;
  document.getElementById('platL').value=p.l;
  document.getElementById('platEditIdx').value=idx;
  document.getElementById('platFormTitle').textContent='✏️ MODIFIER';
  document.getElementById('platCancelBtn').style.display='block';
  document.getElementById('ingrList').innerHTML='';
  ingrCounter=0;
  (p.ingredients||[]).forEach(i=>addIngrRow(i.nom,i.qty,i.unit));
  showPage('plats');
  window.scrollTo({top:0,behavior:'smooth'});
}

function cancelPlatEdit(){resetPlatForm();}

async function deletePlat(idx) {
  if (!confirm('Supprimer "'+plats[idx].nom+'" ?')) return;
  plats.splice(idx,1);
  await dbSet('plats',JSON.stringify(plats));
  renderPlats();
}

function renderPlats() {
  const el=document.getElementById('platsList');
  if (!plats.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">🍽️</div>Aucun plat encore.</div>';return;}
  const order=['ptdej','dejeuner','diner','collation','any'];
  const labels={ptdej:'🌅 Petit déj',dejeuner:'🕛 Déjeuner',diner:'🌙 Dîner',collation:'🍎 Collation',any:'🍽️ Tous repas'};
  let html='';
  order.forEach(cat=>{
    const items=plats.filter(p=>p.repas===cat);
    if (!items.length) return;
    html+=`<div class="section-lbl">${labels[cat]}</div>`;
    items.forEach(p=>{
      const idx=plats.indexOf(p);
      const ingrTxt=(p.ingredients||[]).length ? p.ingredients.map(i=>`${i.nom} ${i.qty}${i.unit}`).join(' · ') : 'Aucun ingrédient';
      html+=`<div class="plat-item">
        <div class="plat-nom">${p.nom}</div>
        <div class="plat-macros">${p.kcal} kcal · P${p.p}g · G${p.g}g · L${p.l}g</div>
        <div class="plat-ingr">${ingrTxt}</div>
        <div style="display:flex;gap:8px;">
          <button class="btn-sm" onclick="editPlat(${idx})">✏️ Modifier</button>
          <button class="btn-sm" style="color:var(--red);border-color:rgba(255,71,87,0.3);" onclick="deletePlat(${idx})">✕ Supprimer</button>
        </div>
      </div>`;
    });
  });
  el.innerHTML=html;
}

// ── INIT ──────────────────────────────────────────────
async function init() {
  await openDB();
  const saved=await dbGet('plats');
  plats=saved?JSON.parse(saved):[];
  renderPlats();
  renderWeek();
}
init();
</script>
</body>
</html>

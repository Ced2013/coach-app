<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Recharge · Marathon Paris 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --card: #222;
    --border: #333;
    --accent: #e8632a;
    --accent-dim: rgba(232,99,42,0.12);
    --green: #4caf50;
    --green-dim: rgba(76,175,80,0.12);
    --blue: #2196f3;
    --blue-dim: rgba(33,150,243,0.12);
    --purple: #9c27b0;
    --purple-dim: rgba(156,39,176,0.12);
    --teal: #009688;
    --teal-dim: rgba(0,150,136,0.12);
    --red: #f44336;
    --red-dim: rgba(244,67,54,0.12);
    --text: #f0f0f0;
    --text-dim: #888;
    --text-muted: #555;
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .app-name {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .countdown {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .countdown span {
    color: var(--accent);
    font-weight: 700;
    font-size: 13px;
  }

  /* DAYS NAV */
  .days-nav {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .days-nav::-webkit-scrollbar { display: none; }

  .day-pill {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px 10px;
    cursor: pointer;
    min-width: 48px;
    transition: all 0.15s;
  }

  .day-pill.active { background: var(--accent-dim); border-color: var(--accent); }
  .day-pill.today { border-color: var(--green); }

  .day-pill .wd { font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
  .day-pill.active .wd { color: var(--accent); }
  .day-pill.today .wd { color: var(--green); }

  .day-pill .dd { font-size: 17px; font-weight: 700; color: var(--text); line-height: 1.1; }
  .day-pill.active .dd { color: var(--accent); }
  .day-pill.today .dd { color: var(--green); }

  .day-pill .dt { font-size: 8px; color: var(--text-muted); }
  .day-pill.active .dt { color: var(--accent); opacity: 0.7; }

  /* MAIN */
  .main { padding: 14px 14px 40px; max-width: 480px; margin: 0 auto; }

  /* SECTION */
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 12px; overflow: hidden; }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .section-badge {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .badge-run { background: var(--green-dim); color: var(--green); }
  .badge-rest { background: var(--blue-dim); color: var(--blue); }
  .badge-easy { background: var(--purple-dim); color: var(--purple); }
  .badge-race { background: var(--accent-dim); color: var(--accent); }

  /* MACROS */
  .macros-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    padding: 12px 14px;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }

  .macro-item { text-align: center; }

  .macro-val {
    font-size: 20px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 2px;
  }

  .macro-val.c-kcal { color: var(--accent); }
  .macro-val.c-p { color: var(--green); }
  .macro-val.c-g { color: var(--blue); }
  .macro-val.c-l { color: var(--purple); }

  .macro-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* GLUCIDE BAR */
  .glucide-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }

  .glucide-icon { font-size: 20px; }

  .glucide-label {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .glucide-bar-bg {
    background: var(--border);
    border-radius: 3px;
    height: 5px;
    width: 100%;
    overflow: hidden;
    margin-bottom: 3px;
  }

  .glucide-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--blue);
    transition: width 0.4s ease;
  }

  .glucide-text {
    font-size: 11px;
    color: var(--text-dim);
    font-feature-settings: 'tnum';
  }

  /* HYDRA */
  .hydra-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
  }

  .hydra-icon { font-size: 20px; }

  .hydra-bar-bg {
    flex: 1;
    background: var(--border);
    border-radius: 3px;
    height: 5px;
    overflow: hidden;
  }

  .hydra-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--blue);
    transition: width 0.4s ease;
  }

  .hydra-text { font-size: 12px; color: var(--blue); font-weight: 600; white-space: nowrap; }

  /* SEANCE */
  .seance-content { padding: 12px 14px; font-size: 13px; color: var(--text-dim); line-height: 1.6; }

  /* CHECKLIST */
  .check-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    -webkit-user-select: none;
    user-select: none;
  }

  .check-item:last-child { border-bottom: none; }
  .check-item:active { background: rgba(255,255,255,0.03); }
  .check-item.done { background: rgba(76,175,80,0.05); }

  .check-box {
    width: 20px;
    height: 20px;
    border-radius: 5px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    transition: all 0.15s;
    color: transparent;
  }

  .check-item.done .check-box { background: var(--green); border-color: var(--green); color: white; }

  .check-emoji { font-size: 18px; flex-shrink: 0; }

  .check-body { flex: 1; }

  .check-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 1px;
  }

  .check-item.done .check-name { color: var(--green); text-decoration: line-through; text-decoration-color: rgba(76,175,80,0.4); }

  .check-detail { font-size: 11px; color: var(--text-muted); line-height: 1.4; }

  .check-tag {
    font-size: 8px;
    padding: 2px 6px;
    border-radius: 8px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .t-cryo { background: var(--blue-dim); color: var(--blue); }
  .t-comp { background: var(--purple-dim); color: var(--purple); }
  .t-supp { background: var(--accent-dim); color: var(--accent); }
  .t-mob { background: var(--teal-dim); color: var(--teal); }
  .t-sleep { background: var(--red-dim); color: var(--red); }

  /* PROGRESS */
  .check-progress {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  .cp-label { font-size: 11px; color: var(--text-muted); }
  .cp-bar-bg { flex: 1; background: var(--border); border-radius: 3px; height: 5px; overflow: hidden; }
  .cp-bar-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width 0.3s ease; }
  .cp-pct { font-size: 11px; color: var(--green); font-weight: 600; white-space: nowrap; }

  /* ALERTE */
  .alerte {
    padding: 10px 14px;
    font-size: 11px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
  }

  /* RACE DAY */
  .race-banner {
    background: linear-gradient(135deg, #1a0f08, #0f0a18);
    border: 1px solid var(--accent);
    border-radius: 14px;
    padding: 20px 16px;
    margin-bottom: 12px;
    text-align: center;
  }

  .race-emoji { font-size: 36px; margin-bottom: 8px; }
  .race-title { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: var(--accent); margin-bottom: 4px; }
  .race-sub { font-size: 11px; color: var(--text-dim); margin-bottom: 16px; }

  .timeline { display: flex; flex-direction: column; gap: 5px; text-align: left; }

  .tl-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(232,99,42,0.07);
    border-radius: 8px;
    padding: 7px 10px;
  }

  .tl-time { font-size: 11px; color: var(--accent); font-weight: 600; width: 40px; flex-shrink: 0; font-feature-settings: 'tnum'; }
  .tl-text { font-size: 12px; color: var(--text); }

  /* MANTRAS */
  .mantra-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 9px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .mantra-item:last-child { border-bottom: none; }
  .mantra-item::before { content: '→'; color: var(--accent); flex-shrink: 0; margin-top: 1px; font-weight: 700; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeUp 0.25s ease; }
</style>
</head>

    recup:[
      {id:'cryo', e:'🧊', n:'Cryo Sleeve', d:'15 min · Dernière séance intense → récup max', tag:'cryo', tc:'t-cryo'},
      {id:'flytex', e:'🩱', n:'Manchons Flytex', d:'Après la cryo · Soirée complète · Cheville → cuisse', tag:'compression', tc:'t-comp'},

    kcal:0, P:0, G:0, L:0, hydra:0, seance:'', recup:[]
  }
];

const KEY = 'recharge_v5';
const load = () => { try { return JSON.parse(localStorage.getItem(KEY)||'{}'); } catch { return {}; } };
const save = (c) => { try { localStorage.setItem(KEY, JSON.stringify(c)); } catch {} };
const toggle = (date, id) => { const c=load(); c[`${date}_${id}`]=!c[`${date}_${id}`]; save(c); render(); };
const checked = (date, id) => !!load()[`${date}_${id}`];

// Countdown
const tick = () => {
  const d = Math.ceil((RACE - new Date()) / 86400000);
  document.getElementById('countdown').textContent = d > 0 ? d : '🔥';
};
tick();

let active = (() => {
  const t = new Date().toISOString().split('T')[0];
  const i = DAYS.findIndex(d => d.date === t);
  return i >= 0 ? i : 0;
})();

function buildNav() {
  const t = new Date().toISOString().split('T')[0];
  document.getElementById('daysNav').innerHTML = DAYS.map((d,i) => `
    <button class="day-pill ${i===active?'active':''} ${d.date===t?'today':''}" onclick="go(${i})">
      <span class="wd">${d.wd}</span>
      <span class="dd">${d.dd}</span>
      <span class="dt">${d.dt}</span>
    </button>`).join('');
}

function go(i) {
  active = i; buildNav(); render();
  setTimeout(() => document.getElementById('daysNav').children[i]?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}), 50);
}

function render() {
  const d = DAYS[active];
  if (d.type === 'race') { document.getElementById('main').innerHTML = raceDay(); return; }

  const done = d.recup.filter(r => checked(d.date, r.id)).length;
  const total = d.recup.length;
  const pct = total ? Math.round(done/total*100) : 0;

  const checks = d.recup.map(r => {
    const ok = checked(d.date, r.id);
    return `<div class="check-item ${ok?'done':''}" onclick="toggle('${d.date}','${r.id}')">
      <div class="check-box">${ok?'✓':''}</div>
      <span class="check-emoji">${r.e}</span>
      <div class="check-body">
        <div class="check-name">${r.n}</div>
        <div class="check-detail">${r.d}</div>
      </div>
      <span class="check-tag ${r.tc}">${r.tag}</span>
    </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `<div class="fade-in">

  <div class="section">
    <div class="section-header">
      <span class="section-title">${d.name}</span>
      <span class="section-badge ${d.badgeClass}">${d.badge}</span>
    </div>
    <div class="macros-row">
      <div class="macro-item"><div class="macro-val c-kcal">${d.kcal}</div><div class="macro-lbl">kcal</div></div>
      <div class="macro-item"><div class="macro-val c-p">${d.P}g</div><div class="macro-lbl">protéines</div></div>
      <div class="macro-item"><div class="macro-val c-g">${d.G}g</div><div class="macro-lbl">glucides</div></div>
      <div class="macro-item"><div class="macro-val c-l">${d.L}g</div><div class="macro-lbl">lipides</div></div>
    </div>
    <div class="glucide-row">
      <span class="glucide-icon">🍚</span>
      <div style="flex:1;">
        <div class="glucide-label">Objectif glucides · ${(d.G/74.7).toFixed(1)}g/kg · ${Math.round(d.G/d.kcal*100)}% calories</div>
        <div class="glucide-bar-bg"><div class="glucide-bar-fill" style="width:${Math.min(100,d.G/320*100)}%"></div></div>
        <div class="glucide-text">${d.G}g / 320g max</div>
      </div>
    </div>
    <div class="hydra-row">
      <span class="hydra-icon">💧</span>
      <div class="hydra-bar-bg"><div class="hydra-bar-fill" style="width:${Math.min(100,d.hydra/4*100)}%"></div></div>
      <span class="hydra-text">${d.hydra.toFixed(1)}L min</span>
    </div>
  </div>

  <div class="section">
    <div class="section-header"><span class="section-title">🏃 Séance du jour</span></div>
    <div class="seance-content">${d.seance}</div>
  </div>

  <div class="section">
    <div class="section-header">
      <span class="section-title">🔄 Routine récupération</span>
      <span style="font-size:11px;color:var(--text-muted);">${done}/${total}</span>
    </div>
    ${checks}
    <div class="check-progress">
      <span class="cp-label">Progression</span>
      <div class="cp-bar-bg"><div class="cp-bar-fill" style="width:${pct}%"></div></div>
      <span class="cp-pct">${pct}%</span>
    </div>
    <div class="alerte">⚠️ <span>Zéro alcool · Rien de nouveau · Fais confiance au travail accompli.</span></div>
  </div>

  </div>`;
}
